<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Terrain Scan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

    <div id="controls">
        <h3>Radar Terrain Scan</h3>
        <input type="number" step="0.0001" id="lat" placeholder="Latitude (e.g. 28.6139)">
        <select id="latDir">
            <option value="1">North (N)</option>
            <option value="-1">South (S)</option>
        </select>
        
        <input type="number" step="0.0001" id="lon" placeholder="Longitude (e.g. 77.2090)">
        <select id="lonDir">
            <option value="1">East (E)</option>
            <option value="-1">West (W)</option>
        </select>
        
        <button onclick="fetchRadar()">Scan Terrain</button>
    </div>

    <div id="map"></div>
    <canvas id="radarCanvas"></canvas>

    <script>
        // Initialize Map
        const map = L.map('map').setView([28.6139, 77.2090], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const canvas = document.getElementById('radarCanvas');
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;

        async function fetchRadar() {
            const lat = parseFloat(document.getElementById('lat').value) * parseFloat(document.getElementById('latDir').value);
            const lon = parseFloat(document.getElementById('lon').value) * parseFloat(document.getElementById('lonDir').value);
            
            const res = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({lat: lat, lon: lon, radius: 100})
            });
            const data = await res.json();
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 255, 0, 0.4)';
            
            // Render the mask (adjust scaling as needed)
            data.mask.forEach((row, y) => row.forEach((val, x) => {
                if(val) ctx.fillRect(x * 20, y * 20, 15, 15);
            }));
        }
    </script>
</body>
</html>
