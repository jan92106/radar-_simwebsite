<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin:0; }
        #map { height: 100vh; width: 100vw; }
        #radarCanvas { position: absolute; top:0; left:0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="map"></div>
    <canvas id="radarCanvas"></canvas>
    <script>
        const map = L.map('map').setView([28.6139, 77.2090], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const canvas = document.getElementById('radarCanvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        async function fetchRadar() {
            const response = await fetch('/scan', { // Relative path works on Render
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({lat: 28.6, lon: 77.2, radius: 400})
            });
            const data = await response.json();
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 255, 0, 0.4)';
            data.mask.forEach((row, y) => row.forEach((val, x) => {
                if(val) ctx.fillRect(x*5, y*5, 4, 4);
            }));
        }
        fetchRadar();
    </script>
</body>
</html>
