<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="controls">
        <h3>Radar Terrain Scan</h3>
        <input type="number" step="0.0001" id="lat" placeholder="Latitude">
        <select id="latDir"><option value="1">N</option><option value="-1">S</option></select>
        <input type="number" step="0.0001" id="lon" placeholder="Longitude">
        <select id="lonDir"><option value="1">E</option><option value="-1">W</option></select>
        <button onclick="fetchRadar()">Scan Terrain</button>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([28.6139, 77.2090], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let radarLayer = null;

        async function fetchRadar() {
            const lat = parseFloat(document.getElementById('lat').value) * parseFloat(document.getElementById('latDir').value);
            const lon = parseFloat(document.getElementById('lon').value) * parseFloat(document.getElementById('lonDir').value);
            
            const res = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({lat: lat, lon: lon, radius: 100})
            });
            const data = await res.json();
            
            if (radarLayer) map.removeLayer(radarLayer);
            
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d');
            data.mask.forEach((row, y) => row.forEach((val, x) => {
                if(val) { ctx.fillStyle = 'rgba(0, 255, 0, 0.4)'; ctx.fillRect(x, y, 1, 1); }
            }));
            
            radarLayer = L.imageOverlay(canvas.toDataURL(), [[lat-0.2, lon-0.2], [lat+0.2, lon+0.2]]).addTo(map);
        }
    </script>
</body>
</html>
